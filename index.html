<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo hạn văn bản</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
    }

    iframe {
      display: block;
      width: 100%;
      border: none;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbyTg4PKExzBtRNThYWFhXXGy9f8W1uSdU0q_g7UFV9w6fGJ5Sr2-iaVb1XhTCKL9YnXRQ/exec"
    scrolling="no"
  ></iframe>

  <script>
    const frame = document.getElementById("appFrame");
    window.addEventListener("message", function (e) {
      if (e.data && e.data.type === "setHeight") {
        frame.style.height = e.data.height + "px";
      }
    });
    
    try {
      frame.addEventListener("load", function () {
        try {
          const h = frame.contentDocument.body.scrollHeight;
          if (h > 100) frame.style.height = h + "px";
        } catch (e) {}
      });
    } catch (e) {}

    frame.style.height = "2000px";
  </script>

</body>
</html>
