<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ===== GIỮ NGUYÊN UI ===== */
body { font-family: Arial; margin:0; background:#f5f6fa;}
.container { padding:15px;}
.card { background:white; padding:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); margin-bottom:12px; text-align:center;}
h2 { margin:0 0 10px; font-size:18px;}

input, select {
  padding:10px; border:1px solid #ccc; border-radius:6px;
  width:100%; margin-bottom:8px; font-size:14px;
}

.table-wrap { overflow-x:auto; max-height:60vh; border:1px solid #ccc;}
table { width:100%; border-collapse:collapse; min-width:600px;}
th { background:#dee2e6;}
th,td { border-bottom:1px solid #bbb; padding:8px; font-size:13px;}

.overdue {background:#ffcccc;}
.soon {background:#fff3cd;}
.normal {background:#d4edda;}

.filter-bar { display:flex; justify-content:center; gap:15px;}
.filter-item { display:flex; align-items:center; gap:8px; width:300px;}
.icon { font-size:18px;}

mark {
  background:#ffe066;
  padding:2px 4px;
  border-radius:4px;
}

.file-btn {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#58b3f5;
  color:#0d6efd;
  width:20px;
  height:20px;
  border-radius:6px;
  text-decoration:none;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <h2>📢 BÁO HẠN VĂN BẢN</h2>
  <p id="today"></p>
</div>

<div class="card filter-bar">
  <div class="filter-item">
    <span class="icon">🔍</span>
    <input id="search" placeholder="Tìm kiếm">
  </div>

  <div class="filter-item">
    <span class="icon">🏢</span>
    <select id="donvi"></select>
  </div>
</div>

<div class="card stats">
  <div id="statOverdue"></div>
  <div id="statSoon"></div>
  <div id="statNormal"></div>
</div>

<div class="card">
  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th onclick="sortTable(0)">STT</th>
          <th onclick="sortTable(1)">Số VB</th>
          <th onclick="sortTable(2)">Nội dung</th>
          <th onclick="sortTable(3)">Đơn vị</th>
          <th onclick="sortTable(4)">Hạn</th>
          <th onclick="sortTable(5)">Trạng thái</th>
          <th onclick="sortTable(6)">Đã ban hành</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

</div>

<script>
const API = "AKfycbzgEjByY-xa2odLZMnAvywPBRLmPms6l6ZoY-J1FpENybzhZF_pgoz2EMuykKBuNhQd0A";

let DATA = [];
let sortDir = 1;

document.getElementById("today").innerText =
  new Date().toLocaleDateString("vi-VN");

// ===== LOAD DATA =====
fetch(API)
  .then(r => r.json())
  .then(data => {
    DATA = data;
    buildDonVi();
    render(DATA);
  });

// ===== BUILD ĐƠN VỊ =====
function buildDonVi(){
  let set = new Set(DATA.map(d=>d.donVi));
  let html = '<option value="">Tất cả đơn vị</option>';
  set.forEach(d => html += `<option>${d}</option>`);
  document.getElementById("donvi").innerHTML = html;
}

// ===== RENDER =====
function render(list){
  let tbody = document.querySelector("#tbl tbody");
  let html = "";

  let over=0, soon=0, normal=0;

  list.forEach((d,i)=>{

    let cls="normal";
    if(d.diff<0){cls="overdue"; over++;}
    else if(d.diff<=3){cls="soon"; soon++;}
    else normal++;

    let han = d.hanDate ? new Date(d.hanDate).toLocaleDateString("vi-VN") : "";

    html += `
    <tr class="${cls}" data-donvi="${d.donVi}">
      <td>${i+1}</td>
      <td>
        ${d.linkFile ? `<a href="${d.linkFile}" target="_blank" class="file-btn">📄</a>` : ""}
        <b>${d.soVB}</b>
      </td>
      <td>${d.noiDung||""}</td>
      <td>${d.donVi||""}</td>
      <td>${han}</td>
      <td>${d.trangThai||""}</td>
      <td>
        ${d.linkFile2 ? `<a href="${d.linkFile2}" target="_blank" class="file-btn">📄</a>` : ""}
        ${d.soVBBHcapXa||""}
      </td>
    </tr>`;
  });

  tbody.innerHTML = html;

  document.getElementById("statOverdue").innerHTML = over + " VB<br>Quá hạn";
  document.getElementById("statSoon").innerHTML = soon + " VB<br>Sắp hết hạn";
  document.getElementById("statNormal").innerHTML = normal + " VB<br>Còn hạn";
}

// ===== SORT =====
function sortTable(colIndex){
  let rows = Array.from(document.querySelectorAll("#tbl tbody tr"));

  rows.sort((a,b)=>{
    let A = a.children[colIndex].innerText.trim();
    let B = b.children[colIndex].innerText.trim();

    if(colIndex==4){
      let da = new Date(A.split("/").reverse().join("-"));
      let db = new Date(B.split("/").reverse().join("-"));
      return (da-db)*sortDir;
    }

    return A.localeCompare(B,'vi')*sortDir;
  });

  sortDir *= -1;

  let tbody = document.querySelector("#tbl tbody");
  rows.forEach(r=>tbody.appendChild(r));
}

// ===== REMOVE DẤU =====
function removeVietnameseTones(str){
  return str.normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/đ/g,"d")
    .toLowerCase();
}

// ===== HIGHLIGHT =====
function highlight(td, keyword){
  let text = td.innerText;
  let norm = removeVietnameseTones(text);
  let k = removeVietnameseTones(keyword);

  let i = norm.indexOf(k);
  if(i==-1) return;

  td.innerHTML = text.replace(new RegExp(keyword,"gi"), m=>`<mark>${m}</mark>`);
}

// ===== FILTER =====
document.getElementById("search").oninput = filter;
document.getElementById("donvi").onchange = filter;

function filter(){
  let keywords = document.getElementById("search").value
    .toLowerCase().split(" ").filter(x=>x);

  let dv = document.getElementById("donvi").value;

  let rows = document.querySelectorAll("#tbl tbody tr");

  let over=0, soon=0, normal=0;

  rows.forEach(r=>{
    let text = removeVietnameseTones(r.innerText);
    let ok = keywords.every(k=>text.includes(removeVietnameseTones(k)));

    if(dv && r.dataset.donvi !== dv) ok=false;

    r.style.display = ok ? "" : "none";

    // reset highlight
    r.querySelectorAll("td").forEach(td=>{
      td.innerHTML = td.innerText;
    });

    // highlight
    if(ok && keywords.length){
      r.querySelectorAll("td").forEach(td=>{
        keywords.forEach(k=>highlight(td,k));
      });
    }

    if(ok){
      if(r.classList.contains("overdue")) over++;
      else if(r.classList.contains("soon")) soon++;
      else normal++;
    }
  });

  document.getElementById("statOverdue").innerHTML = over + " VB<br>Quá hạn";
  document.getElementById("statSoon").innerHTML = soon + " VB<br>Sắp hết hạn";
  document.getElementById("statNormal").innerHTML = normal + " VB<br>Còn hạn";
}
</script>

</body>
</html>
