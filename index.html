<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; margin:0; background:#f5f6fa;}
.container { padding:15px;}
.card { background:white; padding:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); margin-bottom:12px; text-align:center;}
h2 { margin:0 0 10px; font-size:18px;}

input, select {
  padding:10px; border:1px solid #ccc; border-radius:6px;
  width:100%; margin-bottom:8px; font-size:14px;
}

.table-wrap { overflow-x:auto; max-height:60vh; border:1px solid #ccc;}
table { width:100%; border-collapse:collapse; min-width:600px;}
th { background:#dee2e6;}
th,td { border-bottom:1px solid #bbb; padding:8px; font-size:13px;}

.overdue {background:#ffcccc;}
.soon {background:#fff3cd;}
.normal {background:#d4edda;}
.dung {background:#e2e3e5;}

.filter-bar { display:flex; justify-content:center; gap:15px;}
.filter-item { display:flex; align-items:center; gap:8px; width:300px;}
.icon { font-size:18px;}

.file-btn {
  display:inline-flex; align-items:center; justify-content:center;
  background:#58b3f5; color:#0d6efd;
  width:20px; height:20px; border-radius:6px;
  text-decoration:none;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <h2>📢 BÁO HẠN VĂN BẢN</h2>
  <p id="today"></p>
</div>

<div class="card filter-bar">
  <div class="filter-item">
    <span class="icon">🔍</span>
    <input id="search" placeholder="Tìm kiếm">
  </div>

  <div class="filter-item">
    <span class="icon">🏢</span>
    <select id="donvi"></select>
  </div>
</div>

<div class="card stats">
  <div id="statOverdue">0</div>
  <div id="statSoon">0</div>
  <div id="statNormal">0</div>
</div>

<div class="card">
  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th>STT</th>
          <th>Số VB</th>
          <th>Nội dung</th>
          <th>Đơn vị</th>
          <th>Hạn</th>
          <th>Trạng thái</th>
          <th>Đã ban hành</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzOI8iCFhVZaQljkAuhEyeC5hhXldamV9HCmprAHEzlFz7D6eDDoySGPMVMAC494fgy8Q/exec";

let DATA = [];

document.getElementById("today").innerText =
  new Date().toLocaleDateString("vi-VN");

// 🚀 load data siêu nhanh
fetch(API)
  .then(r => r.json())
  .then(data => {
    DATA = data;
    buildDonVi();
    render(DATA);
  });

// build dropdown
function buildDonVi(){
  let set = new Set(DATA.map(d=>d.donVi));
  let html = '<option value="">Tất cả đơn vị</option>';
  set.forEach(d => html += `<option>${d}</option>`);
  document.getElementById("donvi").innerHTML = html;
}

// render table
function render(list){
  let tbody = document.querySelector("#tbl tbody");
  let html = "";
  let over=0, soon=0, normal=0;

  list.forEach((d,i)=>{

    let cls="normal";
    if(d.dung) cls="dung";
    else if(d.diff<0){cls="overdue"; over++;}
    else if(d.diff<=3){cls="soon"; soon++;}
    else normal++;

    let han = d.hanDate ? new Date(d.hanDate).toLocaleDateString("vi-VN") : "";

    html += `
    <tr class="${cls}">
      <td>${i+1}</td>
      <td>
        ${d.linkFile ? `<a href="${d.linkFile}" target="_blank" class="file-btn">📄</a>` : ""}
        <b>${d.soVB}</b>
      </td>
      <td>${d.noiDung||""}</td>
      <td>${d.donVi||""}</td>
      <td>${han}</td>
      <td>${d.trangThai||""}</td>
      <td>
        ${d.linkFile2 ? `<a href="${d.linkFile2}" target="_blank" class="file-btn">📄</a>` : ""}
        ${d.soVBBHcapXa||""}
      </td>
    </tr>`;
  });

  tbody.innerHTML = html;

  document.getElementById("statOverdue").innerHTML = over + " quá hạn";
  document.getElementById("statSoon").innerHTML = soon + " sắp hết hạn";
  document.getElementById("statNormal").innerHTML = normal + " còn hạn";
}

// filter
document.getElementById("search").oninput = filter;
document.getElementById("donvi").onchange = filter;

function filter(){
  let k = document.getElementById("search").value.toLowerCase();
  let dv = document.getElementById("donvi").value;

  let f = DATA.filter(d =>
    (!k || JSON.stringify(d).toLowerCase().includes(k)) &&
    (!dv || d.donVi===dv)
  );

  render(f);
}
</script>

</body>
</html>
